services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-cashier-backend
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-smart-cashier-secret-key-2026}
      - DB_PATH=/app/data/smart_cashier.db
      - GIN_MODE=release
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-cashier-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  uploads:
